<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>How's the sky looking today?</h1>

      <input type="text" placeholder="Search for a place..." class="search" />
      <button id="btn1">Search</button>

      <div class="weather-layout">

        <!-- LEFT PART -->
        <div class="left-section">

          <div class="main-card">
            <h2>Berlin, Germany</h2>
            <p>Sunny</p>
            <p class="temp">20*</p>
          </div>

          <div class="details">
            <div>Feels Like <span>18°</span></div>
            <div>Humidity <span>46%</span></div>
            <div>Wind <span>14 km/h</span></div>
            <div>Precipitations <span>0 mm</span></div>
          </div>

          <div class="forecast">
            <h2>Daily Forecast</h2>
            <div class="day">Tue <span>27°</span></div>
            <div class="day">Wed <span>22°</span></div>
            <div class="day">Thu <span>19°</span></div>
            <div class="day">Fri <span>21°</span></div>
            <div class="day">Sat <span>24°</span></div>
            <div class="day">Sun <span>27°</span></div>
          </div>

        </div>

        <!-- RIGHT PART -->
        <div class="right-section">
            <h3>Today</h3>

            <div class="hour">
                <span>3 PM</span>
                <span>@</span>
                <span>18°</span>
            </div>

            <div class="hour">
                <span>4 PM</span>
                <span>@</span>
                <span>17°</span>
            </div>

            <div class="hour">
                <span>5 PM</span>
                <span>@</span>
                <span>16°</span>
            </div>

            <div class="hour">
                <span>6 PM</span>
                <span>@</span>
                <span>15°</span>
            </div>  

            <div class="hour">
                <span>7 PM</span>
                <span>@</span>
                <span>14°</span>
            </div>

            <div class="hour">
                <span>8 PM</span>
                <span>@</span>
                <span>13°</span>
            </div>

            <div class="hour">
                <span>9 PM</span>
                <span>@</span>
                <span>12°</span>
            </div>

            <div class="hour">
                <span>10 PM</span>
                <span>@</span>
                <span>11°</span>
            </div>

        </div>
      </div>
    </div>
  </body>
</html>
